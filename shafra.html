<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ورقة شفرة - نسخة هيكا</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Cairo:wght@400;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --bg-color: #0f172a;
            --card-default: #ffffff;
            --team1-color: #2563eb;
            --team2-color: #dc2626;
            --neutral-color: #000000;
            --bomb-color: #10b981;
            --text-dark: #1e293b;
            --accent-color: #fbbf24;
            --revealed-mark: #ffff00;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .lobby-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 25px;
            border: 2px solid var(--accent-color);
            text-align: center;
            margin-top: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .main-btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 15px;
            border: none;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-local {
            background: #6366f1;
            color: white;
        }

        .btn-online {
            background: var(--accent-color);
            color: black;
        }

        input {
            padding: 12px;
            border-radius: 10px;
            border: none;
            width: 85%;
            margin: 10px 0;
            text-align: center;
            font-size: 1.1rem;
        }

        .role-selector {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .role-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            font-weight: 800;
            background: #334155;
            color: white;
        }

        .role-btn.active {
            border-color: var(--accent-color);
            background: rgba(251, 191, 36, 0.4);
            color: var(--accent-color);
        }

        #gameArea {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
        }

        .timer-ui {
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 20px;
            border-radius: 20px;
            border: 2px solid var(--accent-color);
            margin-bottom: 10px;
        }

        #timerDisplay {
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent-color);
            font-family: monospace;
        }

        .stats {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 50px;
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
            font-weight: 900;
            font-size: 1.2rem;
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .ctrl-btn {
            padding: 10px 18px;
            border-radius: 12px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background-color: var(--card-default);
            color: var(--text-dark);
            height: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            box-shadow: 0 4px 0px #cbd5e1;
            cursor: pointer;
            user-select: none;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        /* fullscreen-mode adjustments: keep scroll, use 4 columns for phones, smaller cards */
        #gameArea.fs-mode {
            padding: 8px;
            height: 100vh;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Prefer 5 columns in fullscreen mode so more cards fit across the width */
        #gameArea.fs-mode .grid {
            transition: transform 0.18s ease;
            transform-origin: top center;
            width: 100%;
            max-width: 1000px;
            grid-template-columns: repeat(5, 1fr) !important;
        }

        #gameArea.fs-mode .card {
            height: 84px;
            border-radius: 10px;
        }

        #gameArea.fs-mode .emoji {
            font-size: 1.6rem;
        }

        #gameArea.fs-mode .word {
            font-size: 0.9rem;
        }

        .emoji {
            font-size: 2.8rem;
            line-height: 1;
            margin-bottom: 5px;
        }

        .word {
            font-size: 1.1rem;
            font-weight: 900;
        }

        .master-view .card.team1 {
            background-color: var(--team1-color) !important;
            color: white !important;
            border: 2px solid #fff;
        }

        .master-view .card.team2 {
            background-color: var(--team2-color) !important;
            color: white !important;
            border: 2px solid #fff;
        }

        .master-view .card.neutral {
            background-color: var(--neutral-color) !important;
            color: white !important;
            border: 1px solid #444;
        }

        .master-view .card.bomb {
            background-color: var(--bomb-color) !important;
            color: white !important;
            border: 2px solid #fff;
        }

        .master-view .card.revealed::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 12px;
            background-color: var(--revealed-mark);
            box-shadow: 0 -2px 10px rgba(255, 255, 0, 0.8);
        }

        .card.revealed.team1 {
            background-color: var(--team1-color) !important;
            color: white !important;
            box-shadow: none;
            transform: translateY(4px);
        }

        .card.revealed.team2 {
            background-color: var(--team2-color) !important;
            color: white !important;
            box-shadow: none;
            transform: translateY(4px);
        }

        .card.revealed.neutral {
            background-color: var(--neutral-color) !important;
            color: white !important;
            box-shadow: none;
            transform: translateY(4px);
        }

        .card.revealed.bomb {
            background-color: var(--bomb-color) !important;
            color: white !important;
            box-shadow: none;
            transform: translateY(4px);
        }

        .footer-heka {
            margin-top: 20px;
            font-family: 'Pacifico', cursive;
            font-size: 2.2rem;
            color: var(--accent-color);
            opacity: 0.6;
        }

        .return-footer {
            background: transparent;
            color: #64748b;
            border: 1px solid #334155;
            margin: 20px 0;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 700px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .card {
                height: 110px;
            }
        }

        /* Chat Styling */
        .chat-float-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: var(--accent-color);
            color: black;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            border: none;
            transition: transform 0.2s;
        }

        .chat-float-btn:hover {
            transform: scale(1.1);
        }

        .chat-container {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 300px;
            height: 400px;
            background: #1e293b;
            border: 2px solid var(--accent-color);
            border-radius: 15px;
            display: none;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .chat-header {
            background: var(--accent-color);
            color: black;
            padding: 10px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-msg {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 10px;
            max-width: 85%;
            font-size: 0.9rem;
            word-wrap: break-word;
        }

        .chat-msg.mine {
            background: var(--team1-color);
            align-self: flex-end;
            color: white;
        }

        .chat-msg .sender-name {
            font-size: 0.7rem;
            color: #cbd5e1;
            margin-bottom: 2px;
            display: block;
            opacity: 0.8;
        }

        .chat-input-area {
            display: flex;
            padding: 8px;
            border-top: 1px solid #334155;
            background: #0f172a;
        }

        .chat-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #334155;
            border-radius: 5px;
            margin-left: 5px;
            background: #1e293b;
            color: white;
            outline: none;
        }

        .chat-send-btn {
            background: var(--accent-color);
            border: none;
            padding: 0 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .chat-close {
            background: transparent;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }

        .new-msg-dot {
            position: absolute;
            top: 0;
            right: 0;
            width: 15px;
            height: 15px;
            background: #ef4444;
            border-radius: 50%;
            border: 2px solid #1e293b;
            display: none;
        }
    </style>
</head>

    <div id="mainLobby" class="lobby-box">
        <h1 style="color:var(--accent-color); margin-bottom:20px;">🧠 ورقة شفرة</h1>
        <button class="main-btn btn-local" onclick="startLocal()">لعب محلي (Local) 🏠</button>
        <button class="main-btn btn-online" onclick="showOnlineMenu()">لعب أونلاين (Online) 🌐</button>
    </div>

    <div id="onlineMenu" class="lobby-box" style="display:none;">
        <h2 style="color:var(--accent-color)">دخول الغرفة 🌐</h2>
        <h3 id="displayName" style="color:white; margin:10px 0;"></h3>
        <!-- <input type="text" id="playerName" placeholder="اكتب اسمك للمحادثة 💬"> -->
        <input type="text" id="roomInput" placeholder="رقم الغرفة (مثلاً heka7)">
        <p>اختار دورك:</p>
        <div class="role-selector">
            <button id="roleMaster" class="role-btn" onclick="setRole('master')">سيد الكود 🕶️</button>
            <button id="roleExplorer" class="role-btn active" onclick="setRole('explorer')">مستكشف 🕵️‍♂️</button>
        </div>
        <button class="main-btn btn-online" onclick="joinOnline()">دخول الآن</button>
        <button style="background:transparent; color:white; border:none; cursor:pointer;"
            onclick="location.reload()">رجوع 🏠</button>
    </div>

    <div id="gameArea">
        <h2 id="roomLabel" style="color:var(--accent-color); margin:5px;"></h2>

        <div id="localTimer" class="timer-ui">
            <span id="timerDisplay">01:00</span>
            <div style="margin-top:5px">
                <button onclick="controlTimer('start')">▶️</button>
                <button onclick="controlTimer('reset')">🔄</button>
            </div>
        </div>

        <div class="stats">
            <div id="bLeft" style="color:#60a5fa">🔵: 9</div>
            <div id="rLeft" style="color:#f87171">🔴: 8</div>

        <div class="controls">
            <button class="ctrl-btn" style="background:#10b981; color:white;" onclick="resetGameAction()">جولة جديدة

            <button class="ctrl-btn" style="background:#6366f1; color:white;" onclick="toggleFS()">ملء الشاشة
                📺</button>
            <button id="btnMasterToggle" class="ctrl-btn" style="background:#f59e0b; color:black;"
                onclick="toggleMasterView()">تبديل الوضع 🕶️</button>
        </div>

        <div id="gameBoard" class="grid"></div>

        <!-- Chat Elements for Online Mode -->
        <button id="chatTrigger" class="chat-float-btn" onclick="toggleChat()">
            💬 <div id="chatDot" class="new-msg-dot"></div>
        </button>

        <div id="chatBox" class="chat-container">
            <div class="chat-header">
                <span>غرفة الدردشة 💬</span>
                <button class="chat-close" onclick="toggleChat()">✖</button>
            </div>
            <div id="chatHistory" class="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="msgInput" class="chat-input" placeholder="اكتب رسالة..."
                    onkeypress="handleChatKey(event)">
                <button class="chat-send-btn" onclick="sendMsg()">➤</button>
            </div>
        </div>

        <div class="footer-heka">heka</div>

        <button class="return-footer" onclick="location.reload()">العودة للقائمة الرئيسية 🏠</button>

        function showOnlineMenu() { document.getElementById('mainLobby').style.display = 'none'; document.getElementById('onlineMenu').style.display = 'block'; }
        function setRole(r) { myRole = r; document.getElementById('roleMaster').classList.toggle('active', r === 'master'); document.getElementById('roleExplorer').classList.toggle('active', r === 'explorer'); }

        function startLocal() { currentMode = "local"; prepareUI(); resetLocalGame(); }

        function joinOnline() {
            roomId = document.getElementById('roomInput').value.trim();
            // const nameVal = document.getElementById('playerName').value.trim();
            if (!roomId) return alert("فين رقم الغرفة؟");

            // myName is already set on load
            if (!myName) myName = `لاعب ${Math.floor(Math.random() * 100)}`;

            currentMode = "online"; prepareUI();
            isGameOver = false;

            // الاستماع لحالة اللعبة
            db.ref('rooms/' + roomId).on('value', (snap) => {
                const data = snap.val();
                if (data && data.cards) {
                    renderBoard(data.cards);
                    document.getElementById('bLeft').innerText = `🔵: ${data.bCount}`;
                    document.getElementById('rLeft').innerText = `🔴: ${data.rCount}`;

                    if (data.bCount > 0 && data.rCount > 0) {
                        isGameOver = false;
                    }
                    if (data.bCount === 0 && !isGameOver) { 
                        isGameOver = true;
                        alert("تهانينا للفريق الأزرق! لقد فزتم بالمهمة! 🔵🥳"); 
                    }
                    if (data.rCount === 0 && !isGameOver) { 
                        isGameOver = true;
                        alert("تهانينا للفريق الأحمر! لقد فزتم بالمهمة! 🔴🥳"); 
                    }
                } else { resetOnlineGame(); }
            });

            // تفعيل الشات
            initChatSystem();
        }

        function prepareUI() {
            document.getElementById('mainLobby').style.display = 'none';
            document.getElementById('onlineMenu').style.display = 'none';
            document.getElementById('gameArea').style.display = 'flex';
            const board = document.getElementById('gameBoard');
            if (currentMode === "online") {
                document.getElementById('localTimer').style.display = 'none';
                document.getElementById('btnMasterToggle').style.display = 'none';
                document.getElementById('chatTrigger').style.display = 'flex'; // إظهار زر الشات

                document.getElementById('roomLabel').innerText = `غرفة: ${roomId}`;
                if (myRole === 'master') board.classList.add('master-view');
                else board.classList.remove('master-view');
            } else {
                document.getElementById('localTimer').style.display = 'block';
                document.getElementById('btnMasterToggle').style.display = 'inline-block';
                document.getElementById('chatTrigger').style.display = 'none'; // إخفاء زر الشات
                document.getElementById('roomLabel').innerText = "لعب محلي";
                board.classList.remove('master-view');
            }
        }

        function resetGameAction() { if (currentMode === "local") resetLocalGame(); else resetOnlineGame(); }

        function resetLocalGame() {
            isGameOver = false;
            let s = [...words].sort(() => 0.5 - Math.random()).slice(0, 25);
            let r = [...Array(9).fill('team1'), ...Array(8).fill('team2'), ...Array(7).fill('neutral'), 'bomb'].sort(() => 0.5 - Math.random());
            let localCards = s.map((w, i) => ({ w: w.w, e: w.e, r: r[i], v: false }));
            renderBoard(localCards);
            document.getElementById('bLeft').innerText = `🔵: 9`;
            document.getElementById('rLeft').innerText = `🔴: 8`;
            controlTimer('reset');
        }

        function resetOnlineGame() {
            isGameOver = false;
            let s = [...words].sort(() => 0.5 - Math.random()).slice(0, 25);
            let r = [...Array(9).fill('team1'), ...Array(8).fill('team2'), ...Array(7).fill('neutral'), 'bomb'].sort(() => 0.5 - Math.random());
            let cards = s.map((item, i) => ({ w: item.w, e: item.e, r: r[i], v: false }));
            db.ref('rooms/' + roomId).set({ cards, bCount: 9, rCount: 8 });
        }

        function renderBoard(cards) {
            const b = document.getElementById('gameBoard'); b.innerHTML = '';
            cards.forEach((c, i) => {
                const d = document.createElement('div');
                d.className = `card ${c.r} ${c.v ? 'revealed' : ''}`;
                d.innerHTML = `<div class="emoji">${c.e}</div><div class="word">${c.w}</div>`;
                d.onclick = () => {
                    if (isGameOver) return;
                    const isMasterView = b.classList.contains('master-view');
                    if (isMasterView) {
                        alert("يا هيكا أنت سيد كود، المستكشف هو اللي بيفتح الكروت! 🕶️");
                        return;
                    }
                    if (c.v) return;

                    if (currentMode === "online") {
                        db.ref(`rooms/${roomId}/cards/${i}`).update({ v: true });
                        if (c.r === 'bomb') {
                            isGameOver = true;
                            alert("بـوووم! الفريق اللي ضغط على القنبلة خسر الجيم! 💣💥");
                        } else {
                            let teamKey = c.r === 'team1' ? 'bCount' : (c.r === 'team2' ? 'rCount' : null);
                            if (teamKey) db.ref(`rooms/${roomId}/${teamKey}`).transaction(n => (n || 0) - 1);
                        }
                    } else {
                        // وضع المحلي (Local)
                        c.v = true;
                        if (c.r === 'bomb') { 
                            isGameOver = true;
                            alert("بـوووم! الفريق اللي ضغط على القنبلة خسر الجيم! 💣💥"); 
                        }
                        renderBoard(cards);

                        // تحديث العدادات محلياً
                        let bRem = cards.filter(card => card.r === 'team1' && !card.v).length;
                        let rRem = cards.filter(card => card.r === 'team2' && !card.v).length;
                        document.getElementById('bLeft').innerText = `🔵: ${bRem}`;
                        document.getElementById('rLeft').innerText = `🔴: ${rRem}`;

                        if (bRem === 0 && !isGameOver) { 
                            isGameOver = true;
                            alert("تهانينا للفريق الأزرق! لقد فزتم بالمهمة! 🔵🥳");
                        }
                        if (rRem === 0 && !isGameOver) { 
                            isGameOver = true;
                            alert("تهانينا للفريق الأحمر! لقد فزتم بالمهمة! 🔴🥳");
                        }
                    }
                };
                b.appendChild(d);
            });
        }

        function toggleMasterView() { document.getElementById('gameBoard').classList.toggle('master-view'); }
        function toggleFS() {
            const ga = document.getElementById('gameArea');
            // If fullscreen API exists, use it (requires user gesture)
            if (ga.requestFullscreen || ga.webkitRequestFullscreen || ga.msRequestFullscreen) {
                if (!document.fullscreenElement) {
                    if (ga.requestFullscreen) ga.requestFullscreen();
                    else if (ga.webkitRequestFullscreen) ga.webkitRequestFullscreen();
                    else if (ga.msRequestFullscreen) ga.msRequestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                    else if (document.msExitFullscreen) document.msExitFullscreen();
                }
            } else {
                // fallback: toggle the fs-mode class even if browser doesn't support Fullscreen API (useful for some mobile browsers)
                if (!ga.classList.contains('fs-mode')) {
                    ga.classList.add('fs-mode');
                    setTimeout(() => computeAndApplyScale(), 60);
                } else {
                    ga.classList.remove('fs-mode');
                    const board = document.getElementById('gameBoard'); if (board) board.style.transform = '';
                }
            }
        }

        // When entering/exiting fullscreen or resizing, compute a scale to fit the board into the viewport
        function computeAndApplyScale() {
            const board = document.getElementById('gameBoard');
            const ga = document.getElementById('gameArea');
            if (!board) return;
            // If we're using fs-mode layout (4 columns + smaller cards), don't apply transform scaling
            if (ga && ga.classList.contains('fs-mode')) {
                // ensure no transform remains
                board.style.transform = '';
                board.style.webkitTransform = '';
                return;
            }

            // reset first so measurements are natural
            board.style.transform = '';

            // measure required size
            const rect = board.getBoundingClientRect();
            const gapVert = 20; // small buffer for headers/controls
            const availW = window.innerWidth - 20;
            const availH = window.innerHeight - gapVert - 20;

            // If board height is 0 (not rendered yet), skip
            if (rect.width === 0 || rect.height === 0) return;

            const scaleW = availW / rect.width;
            const scaleH = availH / rect.height;
            const scale = Math.min(1, scaleW, scaleH);

            board.style.transform = `scale(${scale})`;
            board.style.webkitTransform = `scale(${scale})`;
        }

        function applyFullscreenLayout() {
            const ga = document.getElementById('gameArea');
            const board = document.getElementById('gameBoard');
            if (document.fullscreenElement) {
                // mark gameArea to apply smaller sizing rules
                ga.classList.add('fs-mode');
                // small timeout to allow browser to enter fullscreen and recalc layout
                setTimeout(() => computeAndApplyScale(), 80);
            } else {
                ga.classList.remove('fs-mode');
                if (board) board.style.transform = '';
            }
        }

        // respond to fullscreen change and window resize
        document.addEventListener('fullscreenchange', applyFullscreenLayout);
        // vendor-specific events
        document.addEventListener('webkitfullscreenchange', applyFullscreenLayout);
        document.addEventListener('msfullscreenchange', applyFullscreenLayout);

        window.addEventListener('resize', () => { if (document.fullscreenElement) computeAndApplyScale(); });
        function controlTimer(action) {
            if (action === 'start') { clearInterval(timerInt); timerInt = setInterval(() => { if (timeLeft > 0) { timeLeft--; updateTimerUI(); } }, 1000); }
            else if (action === 'stop') { clearInterval(timerInt); }
            else { clearInterval(timerInt); timeLeft = 60; updateTimerUI(); }
        }
        function updateTimerUI() { let m = Math.floor(timeLeft / 60).toString().padStart(2, '0'), s = (timeLeft % 60).toString().padStart(2, '0'); document.getElementById('timerDisplay').innerText = `${m}:${s}`; }

        // --- Chat Functions ---
        function toggleChat() {
            isChatOpen = !isChatOpen;
            const box = document.getElementById('chatBox');
            if (isChatOpen) {
                box.style.display = 'flex';
                document.getElementById('chatDot').style.display = 'none'; // إخفاء نقطة التنبيه
                scrollToBottom();
            } else {
                box.style.display = 'none';
            }
        }

        function initChatSystem() {
            const chatRef = db.ref(`rooms/${roomId}/chat`);
            const chatHistory = document.getElementById('chatHistory');
            chatHistory.innerHTML = ''; // تنظيف القديم

            chatRef.limitToLast(50).on('child_added', (snapshot) => {
                const msg = snapshot.val();
                const div = document.createElement('div');
                div.className = `chat-msg ${msg.sender === myName ? 'mine' : ''}`;
                div.innerHTML = `<span class="sender-name">${msg.sender}</span>${msg.text}`;
                chatHistory.appendChild(div);
                scrollToBottom();

                // تنبيه لو الشات مقفول
                if (!isChatOpen) {
                    document.getElementById('chatDot').style.display = 'block';
                }
            });
        }

        function sendMsg() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;

            db.ref(`rooms/${roomId}/chat`).push({
                sender: myName,
                text: text,
                time: firebase.database.ServerValue.TIMESTAMP
            });

            input.value = '';
            input.focus();
        }

        function handleChatKey(e) {
            if (e.key === 'Enter') sendMsg();
        }

        function scrollToBottom() {
            const chatHistory = document.getElementById('chatHistory');
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    </script>
